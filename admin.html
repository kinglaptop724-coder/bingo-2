<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Bingo - Admin ควบคุมเกม</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    body { font-family: 'Kanit', sans-serif; background: #fff3e0; padding: 20px; text-align: center; }
    .container { background: white; padding: 30px; border-radius: 15px; max-width: 600px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    button { background: #e63946; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-family: 'Kanit'; border-radius: 10px; cursor: pointer; margin: 10px; }
    button:hover { background: #d90429; }
    .btn-green { background: #2a9d8f; }
    .btn-green:hover { background: #21867a; }
    input { padding: 10px; font-size: 1.2rem; width: 100px; text-align: center; }
    #current-q { font-size: 3rem; font-weight: bold; color: #1d3557; margin: 20px; }
    .status-dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; }
    .status-online { background:#2a9d8f; }
    .status-offline { background:#e63946; }
  </style>
</head>
<body>

  <div class="container">
    <h1>👨‍🏫 ระบบควบคุมเกม (Admin)</h1>
    <p style="font-size:0.85rem; color:#555;"><span id="conn-dot" class="status-dot status-offline"></span><span id="conn-text">กำลังเชื่อมต่อ...</span></p>

    <div id="setup-section">
      <h3>1. กำหนดจำนวนการ์ดที่เล่นได้ (1-3)</h3>
      <input type="number" id="maxCardsInput" value="3" min="1" max="3">
      <br>
      <button onclick="startGame()">✅ เปิดให้นักเรียนเข้าเกม</button>
    </div>

    <div id="game-section" style="display: none;">
      <h3 style="color: green;">🟢 เกมกำลังเล่นอยู่</h3>
      <div id="current-q">รอสุ่มโจทย์...</div>
      <button class="btn-green" onclick="nextQuestion()">🎲 สุ่มโจทย์ข้อต่อไป</button>
      <br><br><hr><br>
      <button onclick="resetGame()" style="background: #ccc; color: black;">🔄 รีเซ็ตเกมใหม่ทั้งหมด</button>
    </div>
  </div>

  <script>
    // ▼▼▼ ใส่ Firebase Config ของคุณตรงนี้ (ต้องเป็นชุดเดียวกับใน index.html) ▼▼▼
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      databaseURL: "https://YOUR_PROJECT-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    // ▲▲▲ ---------------------------------------------------------- ▲▲▲

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const roomRef = db.ref('roomStatus');

    // แสดงสถานะการเชื่อมต่อ
    db.ref('.info/connected').on('value', (snap) => {
      const dot = document.getElementById('conn-dot');
      const text = document.getElementById('conn-text');
      if (snap.val() === true) {
        dot.className = 'status-dot status-online';
        text.innerText = 'เชื่อมต่อสำเร็จ';
      } else {
        dot.className = 'status-dot status-offline';
        text.innerText = 'กำลังเชื่อมต่อ...';
      }
    });

    // รายการตัวเลข 1-50 ที่จะสุ่ม
    let availableAnswers = Array.from({length: 50}, (_, i) => i + 1);

    function startGame() {
      const maxCards = document.getElementById('maxCardsInput').value;

      roomRef.set({
        state: 'waiting',
        maxCards: parseInt(maxCards),
        currentEquation: 'รอคุณครูสุ่มโจทย์...',
        currentAnswer: 0
      });

      document.getElementById('setup-section').style.display = 'none';
      document.getElementById('game-section').style.display = 'block';
      Swal.fire('สำเร็จ!', 'นักเรียนสามารถกดเข้าเกมได้แล้ว', 'success');
    }

    function nextQuestion() {
      if (availableAnswers.length === 0) {
        Swal.fire('หมดแล้ว!', 'สุ่มครบทุกเลขแล้ว', 'info');
        return;
      }

      let index = Math.floor(Math.random() * availableAnswers.length);
      let answer = availableAnswers.splice(index, 1)[0];
      let equation = createEquation(answer);

      document.getElementById('current-q').innerText = equation;

      // ส่งโจทย์ไปให้นักเรียนทุกคนเห็นพร้อมกันแบบ real-time
      roomRef.update({
        state: 'playing',
        currentEquation: equation,
        currentAnswer: answer
      });
    }

    function resetGame() {
      availableAnswers = Array.from({length: 50}, (_, i) => i + 1);
      roomRef.set({
        state: 'closed', maxCards: 1, currentEquation: '', currentAnswer: 0
      });
      location.reload();
    }

    function createEquation(answer) {
      const ops = ['+', '+', '-', '-'];
      let op = ops[Math.floor(Math.random() * ops.length)];
      let a, b;
      if (op === '+') {
        if (answer > 1) { a = Math.floor(Math.random() * (answer - 1)) + 1; b = answer - a; } else { a = 1; b = 0; }
      } else if (op === '-') {
        b = Math.floor(Math.random() * 20) + 1; a = answer + b;
      }
      return `${a} ${op} ${b} = ?`;
    }
  </script>
</body>
</html>
