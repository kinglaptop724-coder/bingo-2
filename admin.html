<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Bingo - Admin ควบคุมเกม</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body { font-family: 'Kanit', sans-serif; background: #fff3e0; padding: 20px; text-align: center; }
    .container { background: white; padding: 30px; border-radius: 15px; max-width: 650px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    button { background: #e63946; color: white; border: none; padding: 15px 30px; font-size: 1.2rem; font-family: 'Kanit'; border-radius: 10px; cursor: pointer; margin: 10px; }
    button:hover { background: #d90429; }
    .btn-green { background: #2a9d8f; }
    .btn-green:hover { background: #21867a; }
    button:disabled { background: #ccc; color: #888; cursor: not-allowed; }
    input { padding: 10px; font-size: 1.2rem; width: 100px; text-align: center; }
    #current-q { font-size: 3rem; font-weight: bold; color: #1d3557; margin: 20px; }
    .status-dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px; }
    .status-online { background:#2a9d8f; }
    .status-offline { background:#e63946; }

    .player-list { list-style: none; padding: 0; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .player-chip { background: #edf2f4; color: #1d3557; padding: 8px 16px; border-radius: 50px; font-size: 1rem; font-weight: 600; }
    .player-count { font-size: 1.1rem; color: #555; margin-top: 10px; }
    .empty-note { color: #999; font-style: italic; }
  </style>
</head>
<body>

  <div class="container">
    <h1>👨‍🏫 ระบบควบคุมเกม (Admin)</h1>
    <p style="font-size:0.85rem; color:#555;"><span id="conn-dot" class="status-dot status-offline"></span><span id="conn-text">กำลังเชื่อมต่อ...</span></p>

    <!-- ขั้นที่ 1: ตั้งค่าและเปิดห้องรอผู้เล่น -->
    <div id="setup-section">
      <h3>1. กำหนดจำนวนการ์ดที่เล่นได้ (1-3)</h3>
      <input type="number" id="maxCardsInput" value="3" min="1" max="3">
      <br>
      <button onclick="openLobby()">🚪 เปิดห้องรอผู้เล่น</button>
    </div>

    <!-- ขั้นที่ 2: ห้องรอ - แสดงรายชื่อผู้เล่น -->
    <div id="lobby-section" style="display: none;">
      <h3 style="color:#e63946;">🕐 ห้องเปิดแล้ว รอผู้เล่นกด "พร้อมเล่น"</h3>
      <div class="player-count"><span id="player-count-num">0</span> คนเข้าห้องแล้ว</div>
      <ul class="player-list" id="player-list"></ul>
      <br>
      <button class="btn-green" onclick="beginGame()">▶️ เริ่มเกม (ให้นักเรียนเลือกการ์ด)</button>
      <br><br><hr><br>
      <button onclick="resetGame()" style="background: #ccc; color: black;">🔄 ยกเลิก / รีเซ็ต</button>
    </div>

    <!-- ขั้นที่ 3: เกมกำลังเล่น -->
    <div id="game-section" style="display: none;">
      <h3 style="color: green;">🟢 เกมกำลังเล่นอยู่ (<span id="game-player-count">0</span> คน)</h3>
      <div id="current-q">รอสุ่มโจทย์...</div>
      <button class="btn-green" onclick="nextQuestion()">🎲 สุ่มโจทย์ข้อต่อไป</button>
      <br><br><hr><br>
      <button onclick="resetGame()" style="background: #ccc; color: black;">🔄 รีเซ็ตเกมใหม่ทั้งหมด</button>
    </div>
  </div>

  <script>
    // ▼▼▼ ใส่ URL ของ Google Apps Script Web App ที่ deploy แล้ว (ลงท้ายด้วย /exec) ▼▼▼
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx__a0JnYQREQjlVfMAOQ82KMT8q3EGLjDLlv3nKPmSR61yFKKCIHHHvqDHLENTWJL6PA/exec";
    // ▲▲▲ ต้องเป็น URL เดียวกับที่ใส่ใน index.html ▲▲▲

    let availableAnswers = Array.from({length: 50}, (_, i) => i + 1);
    let pollTimer = null;

    function apiGet(action) {
      return fetch(`${APPS_SCRIPT_URL}?action=${action}`).then(r => r.json());
    }
    function apiPost(payload) {
      return fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      }).then(r => r.json());
    }

    function setConnDot(ok) {
      const dot = document.getElementById('conn-dot');
      const text = document.getElementById('conn-text');
      dot.className = 'status-dot ' + (ok ? 'status-online' : 'status-offline');
      text.innerText = ok ? 'เชื่อมต่อสำเร็จ' : 'กำลังเชื่อมต่อ...';
    }

    function startPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(() => {
        apiGet('getRoomState')
          .then(data => { setConnDot(true); renderPlayers(data); })
          .catch(() => setConnDot(false));
      }, 2000);
    }

    function renderPlayers(data) {
      if (!data) return;
      const players = data.players || [];
      document.getElementById('player-count-num').innerText = players.length;
      document.getElementById('game-player-count').innerText = players.length;

      const listEl = document.getElementById('player-list');
      if (players.length === 0) {
        listEl.innerHTML = `<li class="empty-note">ยังไม่มีใครเข้าห้อง...</li>`;
      } else {
        listEl.innerHTML = players.map(p => `<li class="player-chip">🙋 ${p.name}</li>`).join('');
      }
    }

    // เช็คการเชื่อมต่อครั้งแรกตอนโหลดหน้า
    apiGet('getRoomState').then(() => setConnDot(true)).catch(() => setConnDot(false));

    function openLobby() {
      const maxCards = document.getElementById('maxCardsInput').value;
      apiPost({ action: 'startLobby', maxCards: maxCards })
        .then(() => {
          document.getElementById('setup-section').style.display = 'none';
          document.getElementById('lobby-section').style.display = 'block';
          renderPlayers({ players: [] });
          startPolling();
        })
        .catch(() => {
          Swal.fire('ผิดพลาด', 'เปิดห้องไม่สำเร็จ ลองใหม่อีกครั้ง', 'error');
        });
    }

    function beginGame() {
      apiPost({ action: 'beginGame' })
        .then(() => {
          document.getElementById('lobby-section').style.display = 'none';
          document.getElementById('game-section').style.display = 'block';
          Swal.fire('เริ่มเกม!', 'นักเรียนสามารถเลือกจำนวนการ์ดได้แล้ว', 'success');
        })
        .catch(() => {
          Swal.fire('ผิดพลาด', 'เริ่มเกมไม่สำเร็จ ลองใหม่อีกครั้ง', 'error');
        });
    }

    function nextQuestion() {
      if (availableAnswers.length === 0) {
        Swal.fire('หมดแล้ว!', 'สุ่มครบทุกเลขแล้ว', 'info');
        return;
      }

      let index = Math.floor(Math.random() * availableAnswers.length);
      let answer = availableAnswers.splice(index, 1)[0];
      let equation = createEquation(answer);

      document.getElementById('current-q').innerText = equation;

      apiPost({ action: 'nextQuestion', equation: equation, answer: answer });
    }

    function resetGame() {
      availableAnswers = Array.from({length: 50}, (_, i) => i + 1);
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
      apiPost({ action: 'resetGame' }).then(() => location.reload());
    }

    function createEquation(answer) {
      const ops = ['+', '+', '-', '-'];
      let op = ops[Math.floor(Math.random() * ops.length)];
      let a, b;
      if (op === '+') {
        if (answer > 1) { a = Math.floor(Math.random() * (answer - 1)) + 1; b = answer - a; } else { a = 1; b = 0; }
      } else if (op === '-') {
        b = Math.floor(Math.random() * 20) + 1; a = answer + b;
      }
      return `${a} ${op} ${b} = ?`;
    }
  </script>
</body>
</html>
